experiment:
  id: "dirac_simulation"
  schema_version: "DiracSimulation_002"
  description: "Deterministic lattice evolution, causal boundary instrumentation, Richardson pairing"

physics:
  m: 0.2
  w: 1.0
  dt: 0.01
  max_steps: 420

lattice:
  widths: [4, 6, 8, 12, 16, 20] 
  threshold: 0.02
  auto_threshold: true
  sigma_multiplier: 5.0    # (5-sigma)
  edge_window: 2      
  edge_persistence: 3

  observation_mode: "correlation" 
  reference_qubit: "center"

backend:
  mode: "ideal"       
  precision: 0.02
  shots: 8192
  optimization_level: 3
  logging:
    enabled: true
    every_steps: 10


richardson:
  enabled: true
  order_p: 2

analysis:
  outdir: "figures"
  window_mode: "both"
  min_fft_samples: 32
  fft_remove_mean: true
  fft_window: "hann"
  figure_dpi: 300
  heatmap_figsize: [7.5, 4.5]
  trace_fft_figsize: [7.5, 6.0]
  scaling_figsize: [7.0, 4.0]
  save_json_summary: true
