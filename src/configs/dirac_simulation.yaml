experiment:
  id: "DIRAC SIMULATION"
  schema_version: "DiracSimulation_001"
  description: "Deterministic lattice evolution, causal boundary instrumentation, Richardson pairing"

physics:
  m: 0.5
  w: 1.0
  dt: 0.005
  max_steps: 2048

lattice:
  widths: [20]
  threshold: 0.3
  edge_window: 1
  edge_persistence: 10

backend:
  mode: "ideal"             
  precision: 0.02            
  shots: 4096               
  optimization_level: 3
  logging:
    enabled: true
    every_steps: 10


richardson:
  enabled: true
  order_p: 2

analysis:
  outdir: "figures"
  window_mode: "both"
  min_fft_samples: 32
  fft_remove_mean: true
  fft_window: "hann"
  figure_dpi: 300
  heatmap_figsize: [7.5, 4.5]
  trace_fft_figsize: [7.5, 6.0]
  scaling_figsize: [7.0, 4.0]
  save_json_summary: true
